spring:
  application:
    name: ai-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}  # .env에 지정 안 되어 있으면 dev

---
spring:
  config:
    activate:
      on-profile: dev  # dev면 H2 DB / create-drop / 내장 콘솔 사용
  datasource:
    url: jdbc:h2:mem:aibackend;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console  # 콘솔 주소(http://localhost:8080/h2-console)

---
spring:
  config:
    activate:
      on-profile: prod  # prod면 PostgresSQL / update / DB 관리 툴(DBeaver) 사용
  datasource:
    url: jdbc:postgresql://localhost:5432/aibackend
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
